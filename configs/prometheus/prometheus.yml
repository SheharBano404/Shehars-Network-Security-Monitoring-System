### Prometheus main configuration
### Deployed on: Ubuntu Server (192.168.109.128:9090)
### Scrapes metrics from Node Exporter on both Ubuntu and Kali Linux VMs

global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - localhost:9093

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'ubuntu_machine'
    static_configs:
      - targets: ['192.168.109.128:9100']

  - job_name: 'kali_machine'
    static_configs:
      - targets: ['192.168.109.129:9100']

  # To monitor an additional machine, add a new job below:
  # - job_name: 'new_machine'
  #   static_configs:
  #     - targets: ['NEW_IP:9100']
